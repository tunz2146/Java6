<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Xác nhận OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card mx-auto" style="max-width:400px">
        <div class="card-body">
            <h5 class="text-center mb-3">Xác nhận đăng nhập Admin</h5>

            <form method="post" th:action="@{/admin/verify-otp}">
                <input type="text" name="otpInput"
                       class="form-control mb-3"
                       placeholder="Nhập mã OTP" required>

                <div class="text-danger mb-2" th:text="${error}"></div>

                <button class="btn btn-danger w-100">Xác nhận</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
