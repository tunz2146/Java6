<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title layout:title-pattern="$CONTENT_TITLE | GamingShop Admin">GamingShop Admin</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

    <style>
        :root {
            --sidebar-width: 260px;
            --sidebar-collapsed: 68px;
            --topbar-h: 60px;
            --primary: #dc3545;
            --primary-dark: #b02a37;
            --primary-glow: rgba(220,53,69,0.15);
            --sidebar-bg: #0f1117;
            --sidebar-border: rgba(255,255,255,0.06);
            --sidebar-text: rgba(255,255,255,0.6);
            --sidebar-text-active: #fff;
            --sidebar-hover: rgba(255,255,255,0.06);
            --sidebar-active: rgba(220,53,69,0.15);
            --body-bg: #f0f2f7;
            --card-bg: #fff;
            --topbar-bg: #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--body-bg);
            color: #1a1a2e;
            overflow-x: hidden;
        }

        /* ============================
           SIDEBAR
        ============================ */
        .admin-sidebar {
            position: fixed;
            top: 0; left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: width 0.3s ease;
            overflow: hidden;
        }

        .admin-sidebar.collapsed {
            width: var(--sidebar-collapsed);
        }

        /* Logo */
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 18px;
            border-bottom: 1px solid var(--sidebar-border);
            min-height: var(--topbar-h);
            text-decoration: none;
            overflow: hidden;
            white-space: nowrap;
        }
        .sidebar-logo .logo-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--primary), #e83e8c);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1rem;
            flex-shrink: 0;
        }
        .sidebar-logo .logo-text {
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .sidebar-logo .logo-text span { color: var(--primary); }
        .sidebar-logo .logo-badge {
            font-size: 0.6rem;
            background: var(--primary);
            color: #fff;
            padding: 2px 7px;
            border-radius: 50px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Nav */
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .nav-section-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: rgba(255,255,255,0.25);
            padding: 12px 20px 6px;
            white-space: nowrap;
            overflow: hidden;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            margin: 2px 8px;
            border-radius: 10px;
            color: var(--sidebar-text);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            position: relative;
        }
        .sidebar-link i {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }
        .sidebar-link:hover {
            background: var(--sidebar-hover);
            color: #fff;
        }
        .sidebar-link.active {
            background: var(--sidebar-active);
            color: var(--sidebar-text-active);
            font-weight: 600;
        }
        .sidebar-link.active i { color: var(--primary); }
        .sidebar-link.active::before {
            content: '';
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            width: 3px; height: 60%;
            background: var(--primary);
            border-radius: 0 3px 3px 0;
        }
        .sidebar-link .link-badge {
            margin-left: auto;
            background: var(--primary);
            color: #fff;
            font-size: 0.65rem;
            padding: 2px 7px;
            border-radius: 50px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* Divider */
        .sidebar-divider {
            border: none;
            border-top: 1px solid var(--sidebar-border);
            margin: 8px 16px;
        }

        /* Bottom user */
        .sidebar-bottom {
            border-top: 1px solid var(--sidebar-border);
            padding: 14px;
        }
        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            overflow: hidden;
            white-space: nowrap;
        }
        .sidebar-user:hover { background: var(--sidebar-hover); }
        .sidebar-user .avatar {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--primary), #e83e8c);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 0.85rem; font-weight: 700;
            flex-shrink: 0;
        }
        .sidebar-user .user-info { flex: 1; overflow: hidden; }
        .sidebar-user .user-name {
            font-size: 0.82rem; font-weight: 700;
            color: #fff; overflow: hidden; text-overflow: ellipsis;
        }
        .sidebar-user .user-role {
            font-size: 0.7rem; color: var(--primary);
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .sidebar-user .logout-btn {
            color: rgba(255,255,255,0.4);
            font-size: 1rem; flex-shrink: 0;
            transition: color 0.2s;
        }
        .sidebar-user:hover .logout-btn { color: var(--primary); }

        /* ============================
           TOPBAR
        ============================ */
        .admin-topbar {
            position: fixed;
            top: 0;
            left: var(--sidebar-width);
            right: 0;
            height: var(--topbar-h);
            background: var(--topbar-bg);
            border-bottom: 1px solid #e8eaf0;
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            z-index: 999;
            transition: left 0.3s;
            box-shadow: 0 1px 0 #e8eaf0;
        }
        .admin-topbar.collapsed { left: var(--sidebar-collapsed); }

        .topbar-toggle {
            width: 36px; height: 36px;
            border: none; background: #f0f2f7;
            border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #666; font-size: 1rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .topbar-toggle:hover { background: #e2e5ee; color: #333; }

        .topbar-breadcrumb {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #888;
        }
        .topbar-breadcrumb .page-title {
            font-weight: 700; color: #1a1a2e; font-size: 0.95rem;
        }
        .topbar-breadcrumb i { font-size: 0.7rem; }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .topbar-btn {
            width: 36px; height: 36px;
            border: none; background: #f0f2f7;
            border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #666; font-size: 1rem;
            transition: all 0.2s; position: relative;
            text-decoration: none;
        }
        .topbar-btn:hover { background: #e2e5ee; color: #333; }
        .topbar-btn .notif-dot {
            position: absolute; top: 6px; right: 6px;
            width: 8px; height: 8px;
            background: var(--primary);
            border-radius: 50%;
            border: 2px solid #fff;
        }
        .topbar-divider {
            width: 1px; height: 24px; background: #e8eaf0;
        }
        .topbar-shop-btn {
            display: flex; align-items: center; gap: 7px;
            padding: 7px 14px;
            background: var(--primary);
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.8rem; font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .topbar-shop-btn:hover { background: var(--primary-dark); color: #fff; }

        /* ============================
           MAIN CONTENT
        ============================ */
        .admin-main {
            margin-left: var(--sidebar-width);
            margin-top: var(--topbar-h);
            min-height: calc(100vh - var(--topbar-h));
            padding: 28px;
            transition: margin-left 0.3s;
        }
        .admin-main.collapsed { margin-left: var(--sidebar-collapsed); }

        /* ============================
           CARDS & COMPONENTS
        ============================ */
        .admin-card {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid #e8eaf0;
            box-shadow: 0 1px 8px rgba(0,0,0,0.04);
        }
        .admin-card-header {
            padding: 18px 22px;
            border-bottom: 1px solid #f0f2f7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .admin-card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1a1a2e;
            display: flex; align-items: center; gap: 8px;
        }
        .admin-card-title i { color: var(--primary); }
        .admin-card-body { padding: 22px; }

        /* Stat card */
        .stat-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 20px;
            border: 1px solid #e8eaf0;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none; color: inherit;
            display: block;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            color: inherit;
        }
        .stat-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 14px;
        }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: #1a1a2e; line-height: 1; }
        .stat-label { font-size: 0.8rem; color: #888; margin-top: 4px; }
        .stat-change { font-size: 0.75rem; font-weight: 600; margin-top: 8px; }
        .stat-change.up { color: #22c55e; }
        .stat-change.down { color: var(--primary); }

        /* Table */
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table thead th {
            background: #f8f9fc;
            padding: 12px 16px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            border-bottom: 1px solid #e8eaf0;
        }
        .admin-table tbody td {
            padding: 14px 16px;
            font-size: 0.875rem;
            border-bottom: 1px solid #f4f5f9;
            vertical-align: middle;
        }
        .admin-table tbody tr:hover { background: #fafbfd; }
        .admin-table tbody tr:last-child td { border-bottom: none; }

        /* Badge */
        .status-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 12px; border-radius: 50px;
            font-size: 0.75rem; font-weight: 600;
        }
        .status-badge.warning { background: #fff3cd; color: #856404; }
        .status-badge.primary  { background: #cfe2ff; color: #0a58ca; }
        .status-badge.info     { background: #cff4fc; color: #055160; }
        .status-badge.success  { background: #d1e7dd; color: #0a3622; }
        .status-badge.danger   { background: #f8d7da; color: #842029; }
        .status-badge.secondary{ background: #e2e3e5; color: #41464b; }

        /* Buttons */
        .btn-admin-primary {
            background: var(--primary);
            color: #fff; border: none;
            padding: 9px 18px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 600;
            cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 7px;
            transition: background 0.2s;
        }
        .btn-admin-primary:hover { background: var(--primary-dark); color: #fff; }
        .btn-admin-outline {
            background: transparent;
            color: #666; border: 1.5px solid #e0e3ea;
            padding: 8px 16px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 600;
            cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 7px;
            transition: all 0.2s;
        }
        .btn-admin-outline:hover { border-color: #c0c5d0; background: #f8f9fc; color: #333; }

        /* Mobile overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .sidebar-overlay.show { display: block; }

        @media (max-width: 992px) {
            .admin-sidebar { transform: translateX(-100%); width: var(--sidebar-width) !important; }
            .admin-sidebar.mobile-open { transform: translateX(0); }
            .admin-topbar { left: 0 !important; }
            .admin-main { margin-left: 0 !important; padding: 20px 16px; }
        }

        /* Scrollbar global */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d0d5e0; border-radius: 6px; }
    </style>

    <!-- Page-specific styles -->
    <th:block layout:fragment="admin-styles"></th:block>
</head>
<body>

<!-- Mobile overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- ===== SIDEBAR ===== -->
<aside class="admin-sidebar" id="adminSidebar">

    <!-- Logo -->
    <a href="/admin/dashboard" class="sidebar-logo">
        <div class="logo-icon"><i class="bi bi-controller"></i></div>
        <div>
            <div class="logo-text">GAMING<span>SHOP</span></div>
            <div class="logo-badge">ADMIN</div>
        </div>
    </a>

    <!-- Nav -->
    <nav class="sidebar-nav">

        <div class="nav-section-label">Tổng quan</div>
        <a href="/admin/dashboard" class="sidebar-link" data-path="/admin/dashboard">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
        </a>

        <hr class="sidebar-divider"/>
        <div class="nav-section-label">Quản lý</div>

        <a href="/admin/products" class="sidebar-link" data-path="/admin/products">
            <i class="bi bi-box-seam"></i>
            <span>Sản phẩm</span>
        </a>

        <a href="/admin/orders" class="sidebar-link" data-path="/admin/orders">
            <i class="bi bi-receipt-cutoff"></i>
            <span>Đơn hàng</span>
            <span class="link-badge" th:if="${pendingOrders != null and pendingOrders > 0}" th:text="${pendingOrders}">0</span>
        </a>

        <a href="/admin/users" class="sidebar-link" data-path="/admin/users">
            <i class="bi bi-people"></i>
            <span>Khách hàng</span>
        </a>


        <hr class="sidebar-divider"/>
        <div class="nav-section-label">Hệ thống</div>

        <a href="/" target="_blank" class="sidebar-link">
            <i class="bi bi-shop"></i>
            <span>Xem cửa hàng</span>
        </a>

    </nav>

    <!-- Bottom user -->
    <div class="sidebar-bottom">
        <form th:action="@{/logout}" method="post" id="logoutForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="sidebar-user" onclick="document.getElementById('logoutForm').submit()">
                <div class="avatar">A</div>
                <div class="user-info">
                    <div class="user-name" sec:authentication="name">Admin</div>
                    <div class="user-role">Administrator</div>
                </div>
                <i class="bi bi-box-arrow-right logout-btn"></i>
            </div>
        </form>
    </div>
</aside>

<!-- ===== TOPBAR ===== -->
<header class="admin-topbar" id="adminTopbar">
    <button class="topbar-toggle" onclick="toggleSidebar()">
        <i class="bi bi-list" id="toggleIcon"></i>
    </button>

    <div class="topbar-breadcrumb">
        <span>Admin</span>
        <i class="bi bi-chevron-right"></i>
        <span class="page-title" th:text="${pageTitle ?: 'Dashboard'}">Dashboard</span>
    </div>

    <div class="topbar-actions">
        <a href="/admin/orders?status=CHO_XAC_NHAN" class="topbar-btn" title="Đơn hàng chờ duyệt">
            <i class="bi bi-bell"></i>
            <span class="notif-dot" th:if="${pendingOrders != null and pendingOrders > 0}"></span>
        </a>
        <div class="topbar-divider"></div>
        <a href="/" target="_blank" class="topbar-shop-btn">
            <i class="bi bi-shop"></i> Cửa hàng
        </a>
    </div>
</header>

<!-- ===== MAIN CONTENT ===== -->
<main class="admin-main" id="adminMain">
    <th:block layout:fragment="content"></th:block>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let sidebarCollapsed = false;

    function toggleSidebar() {
        const sidebar = document.getElementById('adminSidebar');
        const topbar  = document.getElementById('adminTopbar');
        const main    = document.getElementById('adminMain');
        const overlay = document.getElementById('sidebarOverlay');
        const icon    = document.getElementById('toggleIcon');

        if (window.innerWidth <= 992) {
            // Mobile: slide in/out
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('show');
        } else {
            // Desktop: collapse/expand
            sidebarCollapsed = !sidebarCollapsed;
            sidebar.classList.toggle('collapsed', sidebarCollapsed);
            topbar.classList.toggle('collapsed', sidebarCollapsed);
            main.classList.toggle('collapsed', sidebarCollapsed);
            icon.className = sidebarCollapsed ? 'bi bi-layout-sidebar' : 'bi bi-list';
            localStorage.setItem('adminSidebarCollapsed', sidebarCollapsed);
        }
    }

    // Khôi phục sidebar + tự detect active menu
    window.addEventListener('DOMContentLoaded', () => {
        // Restore collapsed
        const saved = localStorage.getItem('adminSidebarCollapsed');
        if (saved === 'true' && window.innerWidth > 992) {
            sidebarCollapsed = true;
            document.getElementById('adminSidebar').classList.add('collapsed');
            document.getElementById('adminTopbar').classList.add('collapsed');
            document.getElementById('adminMain').classList.add('collapsed');
            document.getElementById('toggleIcon').className = 'bi bi-layout-sidebar';
        }

        // Auto-detect active sidebar link by current URL
        const currentPath = window.location.pathname;
        document.querySelectorAll('.sidebar-link[data-path]').forEach(link => {
            const linkPath = link.getAttribute('data-path');
            if (currentPath === linkPath ||
                (linkPath !== '/admin/dashboard' && currentPath.startsWith(linkPath))) {
                link.classList.add('active');
            }
        });
    });
</script>

<!-- Page-specific scripts -->
<th:block layout:fragment="admin-scripts"></th:block>
</body>
</html>
