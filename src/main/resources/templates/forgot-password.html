<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Quên mật khẩu</title>
    <th:block layout:fragment="css">
    <style>
        .fp-wrapper {
            min-height: 80vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0d1117, #1a1a2e, #16213e);
            padding: 60px 16px;
        }

        .fp-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%; max-width: 440px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.4);
        }

        .fp-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #dc3545, #e83e8c);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin: 0 auto 18px;
            box-shadow: 0 8px 24px rgba(220,53,69,0.3);
        }
        .fp-card h4 { color:#fff; font-weight:800; text-align:center; margin:0 0 6px; }
        .fp-card p.sub  { color:rgba(255,255,255,.4); font-size:.85rem; text-align:center; margin:0 0 28px; }

        /* Alerts */
        .fp-alert {
            border-radius: 12px; padding: 14px 16px;
            font-size: .85rem; margin-bottom: 20px;
            display: flex; align-items: flex-start; gap: 10px;
        }
        .fp-alert.success { background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.25); color:#86efac; }
        .fp-alert.error   { background:rgba(220,53,69,.12);  border:1px solid rgba(220,53,69,.25);  color:#fca5a5; }
        .fp-alert.warning { background:rgba(251,191,36,.12); border:1px solid rgba(251,191,36,.25); color:#fde68a; }

        /* Form */
        .fp-label {
            display:block; color:rgba(255,255,255,.5); font-size:.75rem;
            font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-bottom:7px;
        }
        .fp-input {
            width:100%; padding:13px 16px;
            background:rgba(255,255,255,.06);
            border:1.5px solid rgba(255,255,255,.1);
            border-radius:12px; color:#fff; font-size:.9rem;
            outline:none; transition:border-color .2s;
            font-family: inherit;
        }
        .fp-input:focus { border-color:#dc3545; background:rgba(255,255,255,.09); }
        .fp-input::placeholder { color:rgba(255,255,255,.25); }

        .fp-btn {
            width:100%; padding:13px;
            background:linear-gradient(135deg,#dc3545,#e83e8c);
            color:#fff; border:none; border-radius:12px;
            font-size:.95rem; font-weight:700;
            cursor:pointer; margin-top:20px;
            display:flex; align-items:center; justify-content:center; gap:8px;
            transition:all .2s;
        }
        .fp-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(220,53,69,.35); }
        .fp-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }

        /* Info box */
        .fp-info {
            background:rgba(59,130,246,.1);
            border:1px solid rgba(59,130,246,.2);
            border-radius:12px; padding:14px 16px; margin-top:20px;
        }
        .fp-info p { color:rgba(255,255,255,.45); font-size:.82rem; margin:0; line-height:1.8; }
        .fp-info strong { color:#93c5fd; }

        .fp-back { text-align:center; margin-top:22px; }
        .fp-back a { color:rgba(255,255,255,.3); font-size:.82rem; text-decoration:none; transition:color .2s; }
        .fp-back a:hover { color:#dc3545; }

        .fp-spinner {
            width:16px; height:16px;
            border:2px solid rgba(255,255,255,.3);
            border-top-color:#fff; border-radius:50%;
            animation:spin .7s linear infinite;
            display:none;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">
<div class="fp-wrapper">
    <div class="fp-card">

        <!-- Icon & Title -->
        <div class="fp-icon">🔐</div>
        <h4>Quên mật khẩu?</h4>
        <p class="sub">Nhập email để nhận mật khẩu mới qua hộp thư</p>

        <!-- Alerts (Flash) -->
        <div th:if="${success}" class="fp-alert success">
            <span>✅</span><span th:utext="${success}"></span>
        </div>
        <div th:if="${error}" class="fp-alert error">
            <span>❌</span><span th:text="${error}"></span>
        </div>
        <div th:if="${warning}" class="fp-alert warning">
            <span>⚠️</span><span th:text="${warning}"></span>
        </div>

        <!-- Form -->
        <form id="fpForm" action="/forgot-password" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label class="fp-label">Email đăng ký tài khoản</label>
            <input type="email" name="email" class="fp-input"
                   placeholder="your@gmail.com" required autocomplete="email"/>

            <button type="submit" class="fp-btn" id="fpBtn">
                <div class="fp-spinner" id="fpSpinner"></div>
                <i class="bi bi-envelope-fill" id="fpIcon"></i>
                <span id="fpText">Gửi yêu cầu đặt lại</span>
            </button>
        </form>

        <!-- Hướng dẫn -->
        <div class="fp-info">
            <p>
                📧 Hệ thống sẽ gửi email tới địa chỉ bạn nhập.<br>
                🔐 Mật khẩu mới tạm thời: <strong style="font-size:1.1rem;color:#fbbf24;">1</strong><br>
                ✏️ Vào <strong>Hồ sơ cá nhân</strong> để đổi mật khẩu mới ngay.
            </p>
        </div>

        <div class="fp-back">
            <a href="/login"><i class="bi bi-arrow-left me-1"></i>Quay lại đăng nhập</a>
        </div>

    </div>
</div>
</div>

<th:block layout:fragment="scripts">
<script>
    document.getElementById('fpForm').addEventListener('submit', function() {
        document.getElementById('fpBtn').disabled    = true;
        document.getElementById('fpSpinner').style.display = 'block';
        document.getElementById('fpIcon').style.display    = 'none';
        document.getElementById('fpText').textContent      = 'Đang gửi...';
    });
</script>
</th:block>
</body>
</html>
