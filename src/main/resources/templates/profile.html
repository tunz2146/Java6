<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head>
    <title>Hồ sơ cá nhân</title>
    <th:block layout:fragment="css">
    <style>
        :root { --red: #dc3545; --dark: #1a1a2e; }

        .profile-hero {
            background: linear-gradient(135deg, #0d1117, #1a1a2e, #16213e);
            padding: 40px 0 100px;
            position: relative;
        }
        .profile-hero::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: #f6f7fb;
            clip-path: ellipse(55% 100% at 50% 100%);
        }

        .profile-wrapper {
            background: #f6f7fb;
            padding: 0 0 60px;
        }

        /* Avatar card nổi lên trên hero */
        .profile-avatar-card {
            background: #fff;
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-top: -60px;
            position: relative;
            z-index: 2;
        }
        .avatar-circle {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--red), #e83e8c);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
            font-size: 2.2rem; color: #fff; font-weight: 800;
            box-shadow: 0 4px 20px rgba(220,53,69,0.35);
        }
        .avatar-name {
            font-size: 1.15rem; font-weight: 800; color: var(--dark); margin-bottom: 4px;
        }
        .avatar-email { font-size: 0.82rem; color: #888; margin-bottom: 12px; }
        .role-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 14px; border-radius: 50px; font-size: 0.75rem; font-weight: 700;
        }
        .role-admin { background: linear-gradient(135deg, #dc3545, #b02a37); color: #fff; }
        .role-user  { background: #e8f5e9; color: #2e7d32; }

        .profile-stat {
            display: flex; gap: 0; border-top: 1px solid #f0f0f0; margin-top: 16px; padding-top: 16px;
        }
        .stat-item { flex: 1; text-align: center; }
        .stat-item + .stat-item { border-left: 1px solid #f0f0f0; }
        .stat-num { font-size: 1.2rem; font-weight: 800; color: var(--dark); }
        .stat-lbl { font-size: 0.7rem; color: #aaa; margin-top: 2px; }

        /* Form card */
        .form-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .form-card-header {
            background: linear-gradient(135deg, var(--dark), #16213e);
            padding: 20px 26px;
            display: flex; align-items: center; gap: 10px;
        }
        .form-card-header h5 { color: #fff; font-weight: 700; margin: 0; font-size: 1rem; }
        .form-card-header i  { color: var(--red); font-size: 1.1rem; }
        .form-card-body { padding: 28px 26px; }

        /* Form fields */
        .field-group { margin-bottom: 20px; }
        .field-label {
            font-size: 0.8rem; font-weight: 700; color: #666;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 7px; display: block;
        }
        .field-label .req { color: var(--red); }
        .form-control-custom {
            width: 100%;
            border: 1.5px solid #e8eaf0;
            border-radius: 12px;
            padding: 11px 16px;
            font-size: 0.9rem;
            font-family: inherit;
            color: var(--dark);
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .form-control-custom:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(220,53,69,0.08);
        }
        .form-control-custom[readonly] {
            background: #f8f9fc; color: #999; cursor: not-allowed;
        }
        .form-control-custom.is-invalid { border-color: var(--red); }

        /* Password section */
        .password-section {
            background: #fffbf5;
            border: 1.5px solid #fde68a;
            border-radius: 14px;
            padding: 20px;
            margin-top: 24px;
        }
        .password-section-title {
            font-size: 0.85rem; font-weight: 700; color: #92400e;
            display: flex; align-items: center; gap: 7px; margin-bottom: 16px;
        }
        .password-toggle {
            position: relative;
        }
        .password-toggle .toggle-btn {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #aaa; cursor: pointer;
            font-size: 1rem; padding: 0;
        }
        .password-toggle input { padding-right: 42px; }

        /* Alert */
        .alert-custom {
            border-radius: 12px; padding: 14px 18px;
            display: flex; align-items: center; gap: 10px;
            font-size: 0.88rem; font-weight: 500; margin-bottom: 20px;
        }
        .alert-success { background: #e8f5e9; color: #1b5e20; border: 1px solid #a5d6a7; }
        .alert-danger  { background: #fce4ec; color: #880e4f; border: 1px solid #f48fb1; }

        /* Save button */
        .btn-save {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--red), #e83e8c);
            color: #fff; border: none; border-radius: 12px;
            font-size: 0.95rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220,53,69,0.35);
        }
        .btn-save:active { transform: translateY(0); }

        /* Quick links */
        .quick-link {
            display: flex; align-items: center; gap: 12px;
            padding: 13px 16px; border-radius: 12px;
            text-decoration: none; color: var(--dark);
            border: 1.5px solid #e8eaf0; margin-bottom: 10px;
            transition: all 0.2s;
        }
        .quick-link:hover { border-color: var(--red); color: var(--red); background: #fff5f5; }
        .quick-link i { font-size: 1.1rem; width: 20px; text-align: center; }
        .quick-link span { font-size: 0.88rem; font-weight: 600; }
        .quick-link .ql-arrow { margin-left: auto; color: #ccc; font-size: 0.8rem; }
    </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">

    <!-- Hero -->
    <div class="profile-hero">
        <div class="container">
            <h4 class="text-white fw-bold mb-1">
                <i class="bi bi-person-circle me-2" style="color:#dc3545;"></i>Hồ sơ cá nhân
            </h4>
            <p class="text-white-50 small mb-0">Quản lý thông tin tài khoản của bạn</p>
        </div>
    </div>

    <!-- Body -->
    <div class="profile-wrapper">
        <div class="container">
            <div class="row g-4">

                <!-- CỘT TRÁI: Avatar + Quick links -->
                <div class="col-lg-4">

                    <!-- Avatar Card -->
                    <div class="profile-avatar-card">
                        <div class="avatar-circle"
                             th:text="${nguoiDung.ten != null and !nguoiDung.ten.isEmpty()
                                       ? #strings.toUpperCase(#strings.substring(nguoiDung.ten, 0, 1))
                                       : #strings.toUpperCase(#strings.substring(nguoiDung.email, 0, 1))}">A</div>

                        <div class="avatar-name" th:text="${nguoiDung.ten ?: 'Chưa cập nhật'}">Tên</div>
                        <div class="avatar-email" th:text="${nguoiDung.email}">email</div>

                        <span th:if="${nguoiDung.role == 'ADMIN'}" class="role-badge role-admin">
                            <i class="bi bi-shield-fill-check"></i> Administrator
                        </span>
                        <span th:unless="${nguoiDung.role == 'ADMIN'}" class="role-badge role-user">
                            <i class="bi bi-person-check-fill"></i> Thành viên
                        </span>

                        <div class="profile-stat">
                            <div class="stat-item">
                                <div class="stat-num" th:text="${orderCount ?: 0}">0</div>
                                <div class="stat-lbl">Đơn hàng</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-num">
                                    <i class="bi bi-star-fill" style="color:#fbbf24;font-size:1rem;"></i>
                                </div>
                                <div class="stat-lbl">VIP Member</div>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Links -->
                    <div class="mt-3">
                        <a href="/orders" class="quick-link">
                            <i class="bi bi-bag-fill text-primary"></i>
                            <span>Đơn hàng của tôi</span>
                            <i class="bi bi-chevron-right ql-arrow"></i>
                        </a>
                        <a href="/cart" class="quick-link">
                            <i class="bi bi-cart-fill text-success"></i>
                            <span>Giỏ hàng</span>
                            <i class="bi bi-chevron-right ql-arrow"></i>
                        </a>
                        <a href="/products" class="quick-link">
                            <i class="bi bi-shop text-danger"></i>
                            <span>Tiếp tục mua sắm</span>
                            <i class="bi bi-chevron-right ql-arrow"></i>
                        </a>
                        <!-- Chỉ admin mới thấy -->
                        <a href="/admin/dashboard" class="quick-link" sec:authorize="hasRole('ADMIN')"
                           style="border-color:#fecaca;background:#fff5f5;">
                            <i class="bi bi-speedometer2 text-danger"></i>
                            <span style="color:#dc3545;">Admin Dashboard</span>
                            <i class="bi bi-chevron-right ql-arrow"></i>
                        </a>
                    </div>
                </div>

                <!-- CỘT PHẢI: Form cập nhật -->
                <div class="col-lg-8">

                    <!-- Alert success/error -->
                    <div th:if="${success}" class="alert-custom alert-success">
                        <i class="bi bi-check-circle-fill fs-5"></i>
                        <span th:text="${success}">Thành công</span>
                    </div>
                    <div th:if="${error}" class="alert-custom alert-danger">
                        <i class="bi bi-exclamation-triangle-fill fs-5"></i>
                        <span th:text="${error}">Lỗi</span>
                    </div>

                    <!-- Form thông tin cá nhân -->
                    <div class="form-card mb-4">
                        <div class="form-card-header">
                            <i class="bi bi-person-fill"></i>
                            <h5>Thông tin cá nhân</h5>
                        </div>
                        <div class="form-card-body">
                            <form action="/profile" method="post" id="profileForm">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <!-- Email (readonly) -->
                                <div class="field-group">
                                    <label class="field-label">Email (không thể thay đổi)</label>
                                    <input type="email" class="form-control-custom" readonly
                                           th:value="${nguoiDung.email}"/>
                                </div>

                                <div class="row g-3">
                                    <!-- Họ và tên -->
                                    <div class="col-md-6">
                                        <div class="field-group">
                                            <label class="field-label">Họ và tên <span class="req">*</span></label>
                                            <input type="text" name="ten" class="form-control-custom"
                                                   th:value="${nguoiDung.ten}"
                                                   placeholder="Nguyễn Văn A" required/>
                                        </div>
                                    </div>

                                    <!-- Số điện thoại -->
                                    <div class="col-md-6">
                                        <div class="field-group">
                                            <label class="field-label">Số điện thoại</label>
                                            <input type="tel" name="soDienThoai" class="form-control-custom"
                                                   th:value="${nguoiDung.soDienThoai}"
                                                   placeholder="0794 612 606"/>
                                        </div>
                                    </div>

                                    <!-- Giới tính -->
                                    <div class="col-md-6">
                                        <div class="field-group">
                                            <label class="field-label">Giới tính</label>
                                            <select name="gioiTinh" class="form-control-custom">
                                                <option value="">-- Chọn --</option>
                                                <option value="true"
                                                        th:selected="${nguoiDung.gioiTinh != null and nguoiDung.gioiTinh == true}">Nam</option>
                                                <option value="false"
                                                        th:selected="${nguoiDung.gioiTinh != null and nguoiDung.gioiTinh == false}">Nữ</option>
                                            </select>
                                        </div>
                                    </div>

                                    <!-- Ngày sinh -->
                                    <div class="col-md-6">
                                        <div class="field-group">
                                            <label class="field-label">Ngày sinh</label>
                                            <input type="date" name="ngaySinh" class="form-control-custom"
                                                   th:value="${nguoiDung.ngaySinh != null ?
                                                               #dates.format(nguoiDung.ngaySinh, 'yyyy-MM-dd') : ''}"/>
                                        </div>
                                    </div>
                                </div>

                                <!-- Đổi mật khẩu -->
                                <div class="password-section">
                                    <div class="password-section-title">
                                        <i class="bi bi-shield-lock-fill"></i>
                                        Đổi mật khẩu (để trống nếu không muốn đổi)
                                    </div>
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="field-label">Mật khẩu mới</label>
                                            <div class="password-toggle">
                                                <input type="password" name="newPassword" id="newPwd"
                                                       class="form-control-custom"
                                                       placeholder="Tối thiểu 6 ký tự"/>
                                                <button type="button" class="toggle-btn" onclick="togglePwd('newPwd')">
                                                    <i class="bi bi-eye" id="newPwdIcon"></i>
                                                </button>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="field-label">Xác nhận mật khẩu</label>
                                            <div class="password-toggle">
                                                <input type="password" name="confirmPassword" id="confirmPwd"
                                                       class="form-control-custom"
                                                       placeholder="Nhập lại mật khẩu mới"/>
                                                <button type="button" class="toggle-btn" onclick="togglePwd('confirmPwd')">
                                                    <i class="bi bi-eye" id="confirmPwdIcon"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Nút lưu -->
                                <div class="mt-4">
                                    <button type="submit" class="btn-save">
                                        <i class="bi bi-check2-circle"></i>
                                        Lưu thay đổi
                                    </button>
                                </div>

                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="scripts">
<script>
    // Toggle hiện/ẩn mật khẩu
    function togglePwd(inputId) {
        const input = document.getElementById(inputId);
        const icon  = document.getElementById(inputId + 'Icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }

    // Validate confirm password trước khi submit
    document.getElementById('profileForm').addEventListener('submit', function(e) {
        const newPwd     = document.getElementById('newPwd').value;
        const confirmPwd = document.getElementById('confirmPwd').value;

        if (newPwd && newPwd !== confirmPwd) {
            e.preventDefault();
            alert('⚠️ Mật khẩu xác nhận không khớp!');
            document.getElementById('confirmPwd').classList.add('is-invalid');
            document.getElementById('confirmPwd').focus();
        }
    });

    // Xóa highlight lỗi khi gõ lại
    document.getElementById('confirmPwd').addEventListener('input', function() {
        this.classList.remove('is-invalid');
    });

    // Auto-hide alert sau 4 giây
    setTimeout(() => {
        document.querySelectorAll('.alert-custom').forEach(el => {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 500);
        });
    }, 4000);
</script>
</th:block>
</body>
</html>
