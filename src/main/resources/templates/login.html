<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Đăng nhập - Gaming Shop</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
      body {
        background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        padding: 2rem;
        width: 100%;
        max-width: 400px;
        color: white;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      }
      .form-control {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
      }
      .form-control:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: #dc3545;
        color: white;
        box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25);
      }
      .form-control::placeholder { color: rgba(255,255,255,0.35); }
      .divider {
        display: flex; align-items: center; gap: 12px; margin: 16px 0;
      }
      .divider::before, .divider::after {
        content: ''; flex: 1; height: 1px;
        background: rgba(255,255,255,0.1);
      }
      .divider span { color: rgba(255,255,255,0.3); font-size: 0.78rem; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="text-center mb-4">
        <h2 class="fw-bold">
          <i class="bi bi-controller text-danger me-2"></i>ĐĂNG NHẬP
        </h2>
        <p class="text-white-50">Chào mừng trở lại Gaming Shop</p>
      </div>

      <!-- Thông báo lỗi / thành công -->
      <div th:if="${param.error}" class="alert alert-danger text-center small py-2">
        Email hoặc mật khẩu không đúng!
      </div>
      <div th:if="${param.logout}" class="alert alert-success text-center small py-2">
        Đăng xuất thành công!
      </div>
      <div th:if="${param.registered}" class="alert alert-success text-center small py-2">
        Đăng ký thành công! Vui lòng đăng nhập.
      </div>

      <form th:action="@{/do-login}" method="post">
        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent text-white border-secondary">
              <i class="bi bi-envelope"></i>
            </span>
            <input type="email" name="username" class="form-control"
                   placeholder="name@example.com" required/>
          </div>
        </div>

        <!-- Mật khẩu -->
        <div class="mb-3">
          <label class="form-label">Mật khẩu</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent text-white border-secondary">
              <i class="bi bi-key"></i>
            </span>
            <input type="password" name="password" id="loginPassword"
                   class="form-control" placeholder="Nhập mật khẩu" required/>
            <button type="button" class="input-group-text bg-transparent text-white border-secondary"
                    onclick="toggleLoginPwd()" style="cursor:pointer;">
              <i class="bi bi-eye" id="loginPwdIcon"></i>
            </button>
          </div>
        </div>

        <!-- Ghi nhớ + Quên mật khẩu -->
        <div class="d-flex justify-content-between align-items-center mb-4 small">
          <div class="form-check">
            <input class="form-check-input bg-secondary border-secondary"
                   type="checkbox" id="remember" name="remember-me"/>
            <label class="form-check-label text-white-50" for="remember">Ghi nhớ</label>
          </div>
          <!-- ===== LINK QUÊN MẬT KHẨU ===== -->
          <a href="/forgot-password" class="text-danger text-decoration-none fw-semibold">
            <i class="bi bi-key-fill me-1"></i>Quên mật khẩu?
          </a>
        </div>

        <!-- Nút đăng nhập -->
        <button type="submit" class="btn btn-danger w-100 py-2 fw-bold mb-3">
          <i class="bi bi-box-arrow-in-right me-2"></i>ĐĂNG NHẬP
        </button>

        <div class="divider"><span>hoặc</span></div>

        <div class="text-center small">
          <span class="text-white-50">Chưa có tài khoản?</span>
          <a href="/register" class="text-danger text-decoration-none fw-bold ms-1">Đăng ký ngay</a>
        </div>
        <div class="text-center mt-3">
          <a href="/" class="text-secondary text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i>Về trang chủ
          </a>
        </div>
      </form>
    </div>

    <script>
      function toggleLoginPwd() {
        const input = document.getElementById('loginPassword');
        const icon  = document.getElementById('loginPwdIcon');
        if (input.type === 'password') {
          input.type = 'text';
          icon.className = 'bi bi-eye-slash';
        } else {
          input.type = 'password';
          icon.className = 'bi bi-eye';
        }
      }
    </script>
  </body>
</html>
