spring.application.name=GamingShop

# ============================================================
# DATABASE CONFIGURATION
# ============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=GamingShopDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=Tunz
spring.datasource.password=2146
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# ============================================================
# MAIL CONFIGURATION - JavaMailSender
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=khanhquynhcute1528@gmail.com
spring.mail.password=lbknsykkczjlzwzi
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================================
# THYMELEAF CONFIGURATION
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# STATIC RESOURCES
# ============================================================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
spring.mvc.static-path-pattern=/**

# ============================================================
# DEVTOOLS
# ============================================================
spring.devtools.livereload.enabled=false
spring.devtools.restart.enabled=true

# ============================================================
# ERROR HANDLING
# ============================================================
server.error.whitelabel.enabled=false
server.error.include-message=always

# ============================================================
# LOGGING
# ============================================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n